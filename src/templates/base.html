<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nhập môn công nghệ phần mềm</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="app-shell">
      <header>
        <h1>Nhập môn công nghệ phần mềm</h1>
        <p>Khám phá các bài báo học thuật mới nhất từ arXiv.</p>
        <a class="home-btn" href="{{ url_for('home') }}">Home</a>
        <a class="clear-btn" href="{{ url_for('home') }}">Clear</a>
        <div class="auth-actions">
          {% if current_user.is_authenticated %}
            <span class="auth-badge">Signed in as {{ current_user.email }}</span>
            <form method="post" action="{{ url_for('logout_submit') }}" class="logout-form">
              <button type="submit" class="logout-btn">Logout</button>
            </form>
          {% else %}
            <a class="login-btn" href="{{ url_for('login_page') }}">Login</a>
          {% endif %}
        </div>
        
        <!-- Hamburger menu -->
        <input type="checkbox" id="nav-toggle" class="nav-toggle" />
        <label for="nav-toggle" class="hamburger-icon">☰</label>
        <nav class="hamburger-nav">
          <a href="{{ url_for('login_page') }}">Login</a>
          <a href="{{ url_for('register_page') }}">Register</a>
          <a href="{{ url_for('favourites_page') }}">Favourites</a>
        </nav>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
