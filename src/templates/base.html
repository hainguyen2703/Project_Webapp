<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nhập môn công nghệ phần mềm</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="app-shell">
      <header>
        <h1>Nhập môn công nghệ phần mềm</h1>
        <p>Khám phá các bài báo học thuật mới nhất từ arXiv.</p>
        <a class="home-btn" href="{{ url_for('home') }}">Home</a>
        <a class="clear-btn" href="{{ url_for('home') }}">Clear</a>
        
        <!-- Hamburger menu -->
        <input type="checkbox" id="nav-toggle" class="nav-toggle" />
        <label for="nav-toggle" class="hamburger-icon">☰</label>
        <nav class="hamburger-nav">
          <a href="{{ url_for('favourites_page') }}">Favourites</a>
        </nav>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
