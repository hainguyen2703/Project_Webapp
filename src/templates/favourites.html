{% extends "base.html" %}

{% block content %}
<div class="content">
    <h2>Favourites</h2>

    {% if favourites %}
        <div class="results">
            {% for paper in favourites %}
                <div class="result-item">
                    <h3>
                        <a href="{{ url_for('item_detail', item_id=paper.id, source=paper.source) }}">{{ paper.title }}</a>
                    </h3>
                    <p class="authors">{{ paper.authors | join(', ') }}</p>
                    <p class="published">Published: {{ paper.published_at }}</p>
                    <div class="remove-favourite">
                        <form method="post" action="{{ url_for('favourite_remove') }}" style="display: inline;">
                            <input type="hidden" name="item_id" value="{{ paper.id }}">
                            <input type="hidden" name="source" value="{{ paper.source }}">
                            <button type="submit" class="remove-btn" title="Remove from favourites">×</button>
                        </form>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="empty-state">No favourites saved yet.</p>
    {% endif %}
    <script>
    document.querySelectorAll(".remove-btn").forEach(btn => {
        btn.addEventListener("click", function (event) {
            event.preventDefault(); // chặn reload

            const form = btn.closest("form");
            const formData = new FormData(form);

            fetch(form.action, {
                method: "POST",
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // Xóa item khỏi giao diện
                    const item = btn.closest(".result-item");
                    item.remove();
                }
            });
        });
    });
    </script>

</div>
{% endblock %}
