{% extends "base.html" %}

{% block content %}
<section class="content">
  <h2>Manage interests</h2>
  <p>Choose between {{ min_interests }} and {{ max_interests }} interests.</p>

  {% if error_message %}
    <section class="status-message error">
      <p>{{ error_message }}</p>
    </section>
  {% endif %}

  <form method="post" action="{{ url_for('interests_submit') }}">
    <div class="cards">
      {% for topic in topics %}
        <label class="card" for="manage-interest-{{ topic.key }}">
          <input
            id="manage-interest-{{ topic.key }}"
            type="checkbox"
            name="interest_keys"
            value="{{ topic.key }}"
            {% if topic.key in selected_keys %}checked{% endif %}
          />
          <strong>{{ topic.label }}</strong>
          <p class="meta">{{ topic.key }}</p>
        </label>
      {% endfor %}
    </div>

    <button type="submit">Save Interests</button>
  </form>
</section>
{% endblock %}
