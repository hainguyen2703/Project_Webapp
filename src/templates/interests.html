{% extends "base.html" %}

{% block content %}
<section class="content">
  <h2>Manage interests</h2>
  <p>Choose between {{ min_interests }} and {{ max_interests }} interests.</p>

  {% if error_message %}
    <section class="status-message error">
      <p>{{ error_message }}</p>
    </section>
  {% endif %}

  <form method="post" action="{{ url_for('interests_submit') }}">
    <div class="cards interest-grid">
      {% for topic in topics %}
        <label class="card interest-option" for="manage-interest-{{ topic.key }}">
          <input
            id="manage-interest-{{ topic.key }}"
            type="checkbox"
            name="interest_keys"
            value="{{ topic.key }}"
            class="interest-checkbox"
            {% if topic.key in selected_keys %}checked{% endif %}
          />
          <span class="icon"></span>
          <strong>{{ topic.label }}</strong>
        </label>
      {% endfor %}
    </div>

    <button type="submit">Save Interests</button>
  </form>
</section>
{% endblock %}
