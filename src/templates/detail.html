{% extends "base.html" %}

{% block content %}
  <section class="detail-panel">
    <article>
      <h2>{{ item.title }}</h2>
      <p class="meta">{{ item.source_label }} • {{ item.published_at[:10] }}</p>
      <p class="authors">Authors: {{ item.authors | join(', ') }}</p>
      <p class="summary">{{ item.summary }}</p>
      <p class="source-link">
        <a href="{{ item.url }}" target="_blank" rel="noopener">Open original source</a>
      </p>
      <div class="favourite-toggle">
        <form method="post" action="{{ url_for('favourite_toggle') }}">
          <input type="hidden" name="item_id" value="{{ item.id }}">
          <button type="submit" class="heart-btn" title="{% if is_favourite %}Remove from favourites{% else %}Add to favourites{% endif %}">
            {% if is_favourite %}♥{% else %}♡{% endif %}
          </button>
        </form>
      </div>
    </article>
  </section>
{% endblock %}
